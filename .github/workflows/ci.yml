name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast path: SQLite ledger + in-process store (zero infra).
  test-sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Acceptance tests (SQLite + in-process store)
        env:
          SEED_PARTIES: "400"
        run: pytest tests/ -q

  # Real stack: the identical suite against Postgres (pgvector) + Redis.
  # This proves the app works on a real database, not only the fallbacks.
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bfsi
          POSTGRES_PASSWORD: bfsi
          POSTGRES_DB: bfsi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bfsi"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "psycopg[binary]" redis     # DB drivers for the real stack
      - name: Acceptance tests (Postgres + Redis)
        env:
          SEED_PARTIES: "400"
          DATABASE_URL: postgresql://bfsi:bfsi@localhost:5432/bfsi
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -q
