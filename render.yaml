services:
  - type: web
    name: aria-bfsi-platform
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SEED_PARTIES
        value: "3000"
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DEV_PASSCODE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
